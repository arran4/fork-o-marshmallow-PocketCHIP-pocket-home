name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Build and Package
        uses: uraimo/run-on-arch-action@v2
        id: build
        with:
          arch: armv7
          distro: buster
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y build-essential git libasound2-dev libx11-dev libxrandr-dev libxcursor-dev libxft-dev libxinerama-dev libnm-glib-dev network-manager-dev libi2c-dev libssl-dev pkg-config fakeroot
          run: |
            make -j$(nproc)
            make pack
            mkdir -p out
            cp pocket-home_*.deb out/

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: pocket-home-deb
          path: out/pocket-home_*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: pocket-home-deb

      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: pocket-home_*.deb

  apt-repo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: pocket-home-deb
          path: new-deb

      - name: Setup GPG
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Generate APT Repository
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro

          mkdir -p repo
          if [ -d "gh-pages/archive" ]; then
            cp -a gh-pages/archive/. repo/ || true
          fi

          mkdir -p repo/conf
          cat << EOF > repo/conf/distributions
          Codename: jessie
          Components: main
          Architectures: armhf
          SignWith: ${{ steps.import-gpg.outputs.fingerprint }}
          EOF

          reprepro -b repo includedeb jessie new-deb/*.deb

          gpg --armor --export ${{ steps.import-gpg.outputs.fingerprint }} > repo/public.key

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          destination_dir: archive
